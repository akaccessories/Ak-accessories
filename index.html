<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AK Accessories</title>

<style>
body { margin:0; font-family:Arial; background:#f5f5f5; }

/* Navbar */
nav {
    background:#111;
    color:white;
    padding:15px;
    display:flex;
    justify-content:space-between;
}
nav input {
    padding:5px;
}

/* Products */
.grid {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:15px;
    padding:20px;
}
.card {
    background:white;
    padding:15px;
    border-radius:10px;
    text-align:center;
}
.card img { width:100%; }

/* Button */
.btn {
    background:orange;
    color:white;
    padding:8px 15px;
    border:none;
    cursor:pointer;
}

/* Cart */
#cart {
    position:fixed;
    bottom:0;
    width:100%;
    background:black;
    color:white;
    padding:10px;
}
</style>

</head>

<body>

<!-- Navbar -->
<nav>
<b>AK Accessories</b>
<input type="text" placeholder="Search..." onkeyup="searchProduct(this.value)">
</nav>

<!-- Products -->
<div class="grid" id="productList">

<div class="card">
<img src="https://images.unsplash.com/photo-1601597111158-2fceff292cdc">
<h3>Mobile Cover</h3>
<p>199</p>
<button class="btn" onclick="addToCart('Mobile Cover',199)">Add to Cart</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1585386959984-a4155224a1ad">
<h3>Fast Charger</h3>
<p>499</p>
<button class="btn" onclick="addToCart('Charger',499)">Add to Cart</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1580894908361-967195033215">
<h3>Earphones</h3>
<p>299</p>
<button class="btn" onclick="addToCart('Earphones',299)">Add to Cart</button>
</div>

</div>

<!-- Cart -->
<div id="cart">
Items: <span id="count">0</span> |
Total: ₹<span id="total">0</span>
<button class="btn" onclick="checkout()">Checkout</button>
</div>

<script>
let count = 0;
let total = 0;
let order = "";

function addToCart(name, price){
    count++;
    total += price;
    order += name + ", ";
    document.getElementById("count").innerText = count;
    document.getElementById("total").innerText = total;
}

function checkout(){
    let url = "https://wa.me/919876543210?text=Order: " + order + " Total ₹" + total;
    window.open(url);
}

function searchProduct(value){
    let cards = document.querySelectorAll(".card");
    cards.forEach(card => {
        let text = card.innerText.toLowerCase();
        card.style.display = text.includes(value.toLowerCase()) ? "block" : "none";
    });
}
</script>

</body>
</html>
