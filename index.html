<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AK Accessories</title><style>
body {margin:0;font-family:Arial;background:#f5f5f5;}

/* Navbar */
nav {
  background:#111;
  color:white;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px 20px;
}

nav img {height:50px;}

nav a {
  color:white;
  margin:0 10px;
  text-decoration:none;
}

/* Hero */
.hero {
  text-align:center;
  padding:50px;
  background:#222;
  color:white;
}

/* Search */
.search-box {
  text-align:center;
  margin:20px;
}

.search-box input {
  padding:10px;
  width:80%;
  max-width:400px;
}

/* Products */
.products {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:20px;
  padding:20px;
}

.card {
  background:white;
  padding:15px;
  border-radius:10px;
  text-align:center;
}

.card img {width:100%;height:150px;object-fit:cover;}

.btn {
  background:#111;
  color:white;
  padding:10px;
  border:none;
  cursor:pointer;
}

/* About */
.about {
  padding:20px;
  background:white;
  margin:20px;
  border-radius:10px;
}

/* Cart */
#cart {
  position:fixed;
  bottom:0;
  width:100%;
  background:#111;
  color:white;
  display:flex;
  justify-content:space-between;
  padding:10px;
}

</style></head><body><!-- Navbar --><nav>
  <img src="logo.png" alt="Logo">
  <div>
    <a href="#">Home</a>
    <a href="#products">Products</a>
    <a href="#about">About</a>
  </div>
</nav><!-- Hero Section --><div class="hero">
  <h1>AK Accessories</h1>
  <p>Best Mobile Accessories Shop</p>
</div><!-- Search --><div class="search-box">
  <input type="text" placeholder="Search product..." onkeyup="searchProduct(this.value)">
</div><!-- Products --><div class="products" id="products">  <!-- Product 1 -->  <div class="card">
    <img src="p1.jpg">
    <h3>Headphones</h3>
    <p>₹500</p>
    <button class="btn" onclick="addToCart('Headphones',500)">Add</button>
  </div>  <!-- Product 2 -->  <div class="card">
    <img src="p2.jpg">
    <h3>Charger</h3>
    <p>₹300</p>
    <button class="btn" onclick="addToCart('Charger',300)">Add</button>
  </div></div><!-- About --><div class="about" id="about
